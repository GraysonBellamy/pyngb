name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test:
    permissions:
      contents: read
      id-token: write  # Codecov tokenless (OIDC) upload
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
    - uses: actions/checkout@v5

    # python-version must go through setup-uv (UV_PYTHON): the repo's
    # .python-version (a local-dev pin) otherwise overrides anything
    # actions/setup-python puts on PATH, and every job silently runs 3.13.
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --locked

    - name: Run linting
      run: |
        uv run ruff check src/ tests/
        uv run ruff format --check src/ tests/

    - name: Run type checking
      run: |
        uv run mypy src/pyngb --ignore-missing-imports

    - name: Run tests with coverage
      run: |
        uv run pytest --cov=pyngb --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v7
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        use_oidc: true
        # Coverage upload is informational; a Codecov outage must not fail
        # the test job (publish depends on it).
        fail_ci_if_error: false

  # Installs the lowest versions the floors in pyproject.toml permit and runs
  # the full suite, so the floors stay honest instead of decorative.
  floors:
    name: Lowest dependency floors
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v5

    # The floors are verified on 3.10 (see pyproject.toml); UV_PYTHON must
    # override the repo's .python-version or uv installs 3.13, where
    # numpy 1.24.0 cannot even build.
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: "3.10"

    - name: Install lowest-direct resolution
      run: |
        uv sync --resolution lowest-direct

    - name: Run tests
      run: |
        uv run --no-sync pytest -q

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: "3.11"

    - name: Install dependencies
      run: |
        uv sync --locked

    - name: Run performance benchmarks
      run: |
        uv run python scripts/benchmarks.py --runs 3 > performance-results.txt 2>&1
        echo "Performance benchmark completed"
        cat performance-results.txt

    - name: Upload performance results
      uses: actions/upload-artifact@v5
      with:
        name: performance-results
        path: performance-results.txt

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: "3.11"

    - name: Install dependencies
      run: |
        uv sync --locked

    # Dependency-vulnerability alerting is Dependabot's job; Bandit scans
    # our own code and fails the build on findings.
    - name: Run Bandit Security Scan
      run: |
        uv run bandit -r src/ -f txt

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: "3.11"

    - name: Install documentation dependencies
      run: |
        uv sync --locked --extra docs

    - name: Build documentation
      run: |
        uv run zensical build
        # Add .nojekyll file for GitHub Pages
        touch site/.nojekyll

    - name: Upload documentation artifacts
      uses: actions/upload-artifact@v5
      with:
        name: documentation
        path: site

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [docs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Download documentation artifacts
      uses: actions/download-artifact@v5
      with:
        name: documentation
        path: ./site

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./site

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  build:
    name: Build Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [test, security]

    steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        uv sync --locked --group build

    - name: Build package
      run: |
        uv run python -m build

    - name: Check package
      run: |
        uv run twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v5
      with:
        name: dist
        path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for PyPI Trusted Publishing (OIDC). See:
      # https://docs.pypi.org/trusted-publishers/
      id-token: write
    needs: [test, build]
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
    - uses: actions/checkout@v5

    - name: Download build artifacts
      uses: actions/download-artifact@v5
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@v1.13.0
